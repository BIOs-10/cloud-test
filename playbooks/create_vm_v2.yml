---
- name: Création d'une VM ajout dans bind 9
  hosts: localhost
  gather_facts: false
  vars:
    vm_name_etu: "{{ vm_name }}-{{ username }}"
    vm_user: "{{ username }}"
    dns_server_ip : "{{ lookup('env', 'DNS_SERVER_IP') }}"
    
  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
      api_port: "{{ lookup('env', 'PROXMOX_PORT') }}"
      api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
      api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
      api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
      validate_certs: false
  
  tasks:
    - name: install proxmoxer
      pip:
        name: proxmoxer
        
    - name: install dnspython
      pip:
        name: dnspython
        
    - name: Générer le cloud-init
      template:
        src: user_data.yaml.j2
        dest: "/var/lib/vz/snippets/user_{{ vm_name_etu }}.yaml"
      delegate_to: proxmox
  
    - name: Cloner la VM depuis le Template
      community.proxmox.proxmox_kvm:
        node: "{{ node_name }}"
    
        name: "{{ vm_name_etu }}"
        clone: "{{ iso }}"
        full: true
        storage: local-lvm
        
        format: qcow2
        timeout: 500
        state: present
        
    - name: Resize disque
      community.proxmox.proxmox_disk:
        name: "{{ vm_name_etu }}"
        disk: scsi0
        size: "{{ disk }}G"
        state: resized
        
    - name: Appliquer la configuration Cloud-init custom
      community.proxmox.proxmox_kvm:
        node: "{{ node_name }}"
        
        name: "{{ vm_name_etu }}"
        citype: nocloud
        cicustom: "user=local:snippets/user_{{ vm_name_etu }}.yaml"
        ipconfig:
          ipconfig0: "ip=dhcp"
        cores: "{{ cpu }}"
        memory: "{{ memory }}"
        
        update: true
        
    - name: Démarrer la VM 
      community.proxmox.proxmox_kvm:
        node: "{{ node_name }}"
        name: "{{ vm_name_etu }}"
        state: started
      
    - name: Attendre que la VM monte
      pause:
        seconds: 40
        
    - name: Récupérer les infos de la VM
      community.proxmox.proxmox_vm_info:
        node: "{{ node_name }}"
        name: "{{ vm_name_etu }}"
      register: vm_info

    - name: Stocker le VMID
      ansible.builtin.set_fact:
        vmid: "{{ vm_info.proxmox_vms[0].vmid }}"
        
    - name: Récupérer les interfaces réseau via le guest agent
      ansible.builtin.uri:
        url: "https://{{ lookup('env', 'PROXMOX_HOST') }}:{{ lookup('env', 'PROXMOX_PORT') }}/api2/json/nodes/{{ node_name }}/qemu/{{ vmid }}/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        validate_certs: false
        return_content: true
      register: guest_net
      retries: 5
      delay: 5
      until: guest_net.json.data is not none
      
    - name: Stocker l'IP IPv4 non-loopback de la VM
      ansible.builtin.set_fact:
        vm_ip: >-
          {{
            guest_net.json.data.result
            | rejectattr('name', 'equalto', 'lo')
            | map(attribute='ip-addresses')
            | flatten
            | selectattr('ip-address-type', 'equalto', 'ipv4')
            | rejectattr('ip-address', 'equalto', '127.0.0.1')
            | map(attribute='ip-address')
            | first
          }}
          
    - name: Ajouter une entrée DNS dans BIND9
      community.general.nsupdate:
        server: "{{ lookup('env', 'DNS_SERVER_IP') }}"
        zone: "icube.local"
        record: "{{ vm_name_etu }}"
        type: "A"
        value: "{{ vm_ip }}"
        ttl: 300
        state: present
        key_name: "{{ lookup('env', 'DNS_KEY_NAME') }}"
        key_secret: "{{ lookup('env', 'DNS_KEY_SECRET') }}"
        key_algorithm: "hmac-sha256"
