---
- name: Création d'une VM ajout dans bind 9
  hosts: localhost
  gather_facts: false
  tasks:
    - name: install proxmoxer
      pip:
        name: proxmoxer
  
    - name: Cloner la VM depuis le Template
      community.proxmox.proxmox_kvm:
        node: "proj-cloudi2"
        api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
        api_port: "{{ lookup('env', 'PROXMOX_PORT') }}"
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        validate_certs: false
        name: "test-vm2"
        clone: "template-ubuntu-2404"
        full: true
        storage: local-lvm
        format: qcow2
        timeout: 500
        state: present
        
    - name: Appliquer la configuration Cloud-init custom
      community.proxmox.proxmox_kvm:
        node: "proj-cloudi2"
        api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
        api_port: "{{ lookup('env', 'PROXMOX_PORT') }}"
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        validate_certs: false
        name: "test-vm2"
        update: true
        
        citype: nocloud
        cicustom: "user=local:snippets/user_test.yaml"
        ipconfig:
          ipconfig0: "ip=dhcp"
        
    - name: Démarrer la VM 
      community.proxmox.proxmox_kvm:
        node: "proj-cloudi2"
        api_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
        api_port: "{{ lookup('env', 'PROXMOX_PORT') }}"
        api_user: "{{ lookup('env', 'PROXMOX_USER') }}"
        api_token_id: "{{ lookup('env', 'PROXMOX_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        validate_certs: false
        
        name: "test-vm2"
        state: started
      
    - name: Attendre que la VM monte
      pause:
        seconds: 40
        
    - name: Lancer sync via API
      uri:
        url: "{{ awx_url }}/api/v2/inventory_sources/{{ source_id }}/update/"
        method: POST
        user: "{{ awx_user }}"
        password: "{{ awx_password }}"
        force_basic_auth: yes
        validate_certs: false
        status_code: [200, 202]
      register: inventory_sync
        
    - name: Afficher l'adresse IP du net0
      ansible.builtin.debug:
        msg: "{{ hostvars['test-vm2']['proxmox_agent_interfaces'] }}"
