---
- name: Création d'une VM ajout dans bind 9
  hosts: localhost
  gather_facts: false
  tasks:
    - name: install proxmoxer
      pip:
        name: proxmoxer
        
    - name: Récupérer les interfaces réseau de la VM via le guest agent
      ansible.builtin.uri:
        url: "https://{{ lookup('env', 'PROXMOX_HOST') }}:{{ lookup('env', 'PROXMOX_PORT') }}/api2/json/nodes/proj-cloudi2/qemu/110/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "PVEAPIToken={{ lookup('env', 'PROXMOX_USER') }}!{{ lookup('env', 'PROXMOX_TOKEN_ID') }}={{ lookup('env', 'PROXMOX_TOKEN_SECRET') }}"
        validate_certs: false
        return_content: true
      register: guest_net
    - name: Afficher les interfaces réseau retournées
      ansible.builtin.debug:
        var: guest_net.json
