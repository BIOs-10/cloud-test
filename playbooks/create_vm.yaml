---
- name: Création d'une VM sur Proxmox
  hosts: localhost
  gather_facts: false
  vars:
    pve_node: "pve"           
    pve_api_host: "192.168.1.12"
    pve_user: "root@pam"          
    pve_password: "kun_123456" 

  tasks:
    - name: "1. Installation forcée de la librairie Python Proxmoxer"
      pip:
        name: proxmoxer
        state: present

    - name: "2. Installation forcée de la collection"
      shell: "ansible-galaxy collection install community.general -p /tmp/collections"
      
    - name: Créer une nouvelle VM QEMU
      community.proxmox.proxmox_kvm:
        node: "{{ pve_node }}"
        api_host: "{{ pve_api_host }}"
        api_user: "{{ pve_user }}"
        api_password: "{{ pve_password }}"
        validate_certs: false 

        # Configuration de la VM
        name: "vm-demo"
        vmid: 150
        target: "{{ pve_node }}"
        storage: "local-lvm"
        
        # Ressources
        memory: 2048
        cores: 2
        sockets: 1
        
        # Disque et Réseau
        disk: 5G
        netif: '{"net0":"virtio,bridge=vmbr0"}'
        
        # État souhaité
        state: present
